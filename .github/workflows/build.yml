name: Build PWA and APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-web:
    name: Build PWA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npx vite build

      - name: Upload PWA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-files
          path: dist/

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: pwa-files
          path: dist

      - name: Verify Web Build
        run: |
          ls -R dist
          if [ ! -f dist/index.html ]; then
            echo "Error: index.html not found in dist!"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2.1

      - name: Sync Capacitor
        run: |
          npm install
          npx cap sync android

      - name: Build APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.daemon=false"
        run: |
          cd android
          gradle assembleDebug --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: viabhron-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
