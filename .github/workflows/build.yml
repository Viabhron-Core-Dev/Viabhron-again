name: Build PWA and APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-web:
    name: Build PWA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npx vite build

      - name: Upload PWA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pwa-files
          path: dist/

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: pwa-files
          path: dist

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"
          NDK_PATH=$(find $ANDROID_HOME -name "26.1.10909125" -type d | head -n 1)
          if [ -z "$NDK_PATH" ]; then
            echo "NDK Not Found, using default fallback"
            NDK_PATH="${ANDROID_HOME}/ndk/26.1.10909125"
          fi
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "Using NDK at $NDK_PATH"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: viabhron-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
